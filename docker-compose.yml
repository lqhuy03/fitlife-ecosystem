version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: fitlife_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fitlife_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - fitlife_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - fitlife_network

  redis-cache:
    image: redis:7-alpine
    container_name: fitlife_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fitlife_network

networks:
  fitlife_network:
    driver: bridge

volumes:
  fitlife_mysql_data: